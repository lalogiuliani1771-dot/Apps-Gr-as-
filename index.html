<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auxilio 24/7 - Sistema Integral</title>
    <style>
        :root { --primary: #007bff; --success: #28a745; --dark: #343a40; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 0; }
        .container { max-width: 500px; margin: 20px auto; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Pantalla de Selección */
        .selector-perfil { display: flex; flex-direction: column; gap: 15px; text-align: center; }
        .btn-perfil { padding: 20px; font-size: 18px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; color: white; transition: 0.3s; }
        .btn-cliente { background-color: var(--primary); }
        .btn-chofer { background-color: var(--dark); }

        /* Formularios y Secciones (Ocultas por defecto) */
        .seccion { display: none; }
        .fila { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        /* Mapa */
        #mapa-placeholder { width: 100%; height: 200px; background: #e0e0e0; border-radius: 8px; margin: 10px 0; border: 1px solid #ddd; }
        
        /* Botones de Acción */
        .btn-accion { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; color: white; }
        .btn-verde { background-color: var(--success); }
        .btn-volver { background: none; color: #777; text-decoration: underline; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    
    <div id="pantalla-inicio" class="card selector-perfil">
        <h2>Bienvenido a Auxilio 24/7</h2>
        <p>Por favor, seleccione su perfil:</p>
        <button class="btn-perfil btn-cliente" onclick="mostrarSeccion('cliente')">Soya CLIENTE</button>
        <button class="btn-perfil btn-chofer" onclick="mostrarSeccion('chofer')">Soy CHOFER / GRÚA</button>
    </div>

    <div id="seccion-cliente" class="card seccion">
        <h2 style="color: var(--primary);">Solicitar Auxilio</h2>
        <div class="fila">
            <label>1. Vehículo (Marca/Modelo):</label>
            <input list="lista-v" id="vehiculo" placeholder="Escribí para buscar...">
            <datalist id="lista-v">
                <option value="Toyota Corolla"><option value="Toyota Hilux"><option value="Ford Ranger">
                <option value="Fiat Cronos"><option value="Volkswagen Gol"><option value="Chevrolet Onix">
            </datalist>
        </div>
        <div class="fila">
            <label>2. Ubicación Actual:</label>
            <div id="mapa-placeholder">
                <iframe width="100%" height="100%" frameborder="0" src="https://maps.google.com/maps?q=buenos%20aires&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
            </div>
        </div>
        <div class="fila">
            <label>3. Tipo de Falla:</label>
            <select>
                <option>Mecánica / No arranca</option>
                <option>Pinchadura</option>
                <option>Batería</option>
            </select>
        </div>
        <button class="btn-accion btn-verde">CONTINUAR AL PAGO</button>
        <button class="btn-volver" onclick="irAInicio()">← Volver al inicio</button>
    </div>

    <div id="seccion-chofer" class="card seccion" style="background: #e9ecef;">
        <h2 style="color: var(--dark);">Panel de Servicios</h2>
        <div style="background: white; padding: 15px; border-radius: 8px; border-left: 5px solid var(--success);">
            <p><strong>ESTADO:</strong> <span style="color: var(--success);">PAGO RECIBIDO</span></p>
            <p><strong>Cliente:</strong> Juan Pérez</p>
            <p><strong>Vehículo:</strong> Ford Ranger (AF 456 GG)</p>
            <p><strong>Ubicación:</strong> Av. 9 de Julio 1200</p>
            <button class="btn-accion btn-cliente" onclick="alert('Abriendo GPS...')">VER EN GPS (Waze/Maps)</button>
        </div>
        <button class="btn-accion btn-verde" style="margin-top: 20px;">LLEGUÉ AL LUGAR</button>
        <button class="btn-accion btn-dark" style="background: #6c757d;">LIBERAR / FINALIZAR</button>
        <button class="btn-volver" onclick="irAInicio()">← Volver al inicio</button>
    </div>

</div>

<script>
    function mostrarSeccion(perfil) {
        document.getElementById('pantalla-inicio').style.display = 'none';
        document.querySelectorAll('.seccion').forEach(s => s.style.display = 'none');
        document.getElementById('seccion-' + perfil).style.display = 'block';
    }

    function irAInicio() {
        document.querySelectorAll('.seccion').forEach(s => s.style.display = 'none');
        document.getElementById('pantalla-inicio').style.display = 'flex';
    }
</script>

</body>
</html>
